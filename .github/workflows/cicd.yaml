name: CI-CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Clone repo if not exists
            if [ ! -d "project1" ]; then
              git clone https://https://github.com/mythili2392/project1.git
            fi

            cd project1

            # Pull latest code
            git pull origin main

            # Stop any service using port 80 (like nginx)
            sudo systemctl stop nginx || true
            sudo systemctl stop httpd || true

            # Stop & remove old container
            docker stop project1 || true
            docker rm project1 || true

            # Remove old image (optional but clean)
            docker rmi project1 || true

            # Build new image
            docker build -t project1 .

            # Run new container
            docker run -d -p 80:80 --name project1 project1

