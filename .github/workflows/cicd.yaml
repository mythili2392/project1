name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: git-rep
  AWS_ACCOUNT_ID: 010594764877

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔹 Configure AWS credentials
    - name: deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
       host: ${{ secrets.EC2_HOST }}
       username: ${{ secrets.EC2_USER }}
       key: ${{ secrets.EC2_KEY }}


    # 🔹 Build Docker image
    - name: Build Docker image
      run: docker build -t git-rep .

    # 🔹 Tag image
    - name: Tag Docker image
      run: |
        docker tag git-rep:latest 010594764877.dkr.ecr.ap-south-1.amazonaws.com/git-rep:latest

    # 🔹 Push image
    - name: Push Docker image
      run: |
        docker push 010594764877.dkr.ecr.ap-south-1.amazonaws.com/git-rep:latest
